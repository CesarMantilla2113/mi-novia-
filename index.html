<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Quieres ser mi novia?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0608;
    min-height: 100vh;
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  .petals-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    font-size: 18px;
    animation: fall linear infinite;
    opacity: 0;
  }

  @keyframes fall {
    0% { transform: translateY(-40px) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px 20px 20px;
  }

  .main-title {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(52px, 10vw, 110px);
    color: #f5c6d0;
    text-shadow: 0 0 40px rgba(245,100,120,0.5), 0 0 80px rgba(245,100,120,0.2);
    line-height: 1.1;
    animation: titleGlow 3s ease-in-out infinite;
    letter-spacing: 2px;
  }

  @keyframes titleGlow {
    0%, 100% { text-shadow: 0 0 40px rgba(245,100,120,0.5), 0 0 80px rgba(245,100,120,0.2); }
    50% { text-shadow: 0 0 60px rgba(245,100,120,0.9), 0 0 120px rgba(245,100,120,0.4), 0 0 200px rgba(245,100,120,0.1); }
  }

  .subtitle {
    font-size: 18px;
    color: #c8a0a8;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 8px;
    font-weight: 300;
    font-style: italic;
  }

  .collage {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
    min-height: 700px;
  }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: repeat(8, 70px);
    gap: 8px;
    padding: 10px;
  }

  .photo-slot {
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    background: #1a0a0e;
    border: 1px solid rgba(245,140,160,0.15);
  }

  .photo-slot:hover {
    transform: scale(1.03) rotate(0.5deg);
    box-shadow: 0 12px 40px rgba(200,60,80,0.4);
    z-index: 10;
    border-color: rgba(245,140,160,0.5);
  }

  .photo-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: sepia(10%) contrast(105%) brightness(95%);
    transition: filter 0.3s ease;
  }

  .photo-slot:hover img {
    filter: sepia(0%) contrast(110%) brightness(105%);
  }

  .photo-slot .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(180,40,60,0.08), rgba(0,0,0,0.2));
    pointer-events: none;
  }

  .p1  { grid-column: 1/5;  grid-row: 1/4; }
  .p2  { grid-column: 5/8;  grid-row: 1/3; }
  .p3  { grid-column: 8/13; grid-row: 1/4; }
  .p4  { grid-column: 1/4;  grid-row: 4/7; }
  .p5  { grid-column: 4/8;  grid-row: 3/6; }
  .p6  { grid-column: 8/11; grid-row: 4/7; }
  .p7  { grid-column: 11/13;grid-row: 4/6; }
  .p8  { grid-column: 1/5;  grid-row: 7/9; }
  .p9  { grid-column: 5/9;  grid-row: 6/9; }
  .p10 { grid-column: 9/13; grid-row: 7/9; }
  .p11 { grid-column: 11/13;grid-row: 6/7; }

  .question-section {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 30px 20px 60px;
  }

  .question-text {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(36px, 6vw, 72px);
    color: #f0b8c5;
    margin-bottom: 40px;
    text-shadow: 0 0 30px rgba(240,120,140,0.4);
  }

  .buttons {
    display: flex;
    gap: 30px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 18px 60px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    letter-spacing: 3px;
    border: none;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.3s ease;
    text-transform: uppercase;
    font-weight: 300;
    position: relative;
    overflow: hidden;
  }

  .btn-yes {
    background: linear-gradient(135deg, #c0384a, #8b1a2a);
    color: #ffe8ec;
    box-shadow: 0 4px 30px rgba(180,40,60,0.5);
    border: 1px solid rgba(255,180,190,0.2);
  }

  .btn-yes:hover {
    background: linear-gradient(135deg, #d0485a, #a02033);
    box-shadow: 0 8px 50px rgba(200,50,70,0.7);
    transform: translateY(-3px) scale(1.05);
  }

  .btn-no {
    background: transparent;
    color: #a08090;
    box-shadow: inset 0 0 0 1px rgba(200,100,120,0.3);
    letter-spacing: 4px;
  }

  .btn-no:hover {
    color: #c0a0b0;
    box-shadow: inset 0 0 0 1px rgba(200,100,120,0.7);
    transform: translateY(-2px);
  }

  .response-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 40px;
  }

  .response-overlay.active { display: flex; animation: fadeIn 0.6s ease; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .response-overlay.yes-overlay {
    background: radial-gradient(ellipse at center, rgba(140,20,40,0.97) 0%, rgba(60,5,15,0.99) 100%);
  }

  .response-overlay.no-overlay {
    background: radial-gradient(ellipse at center, rgba(20,15,30,0.97) 0%, rgba(10,8,15,0.99) 100%);
  }

  .response-title {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(50px, 10vw, 120px);
    animation: bounceIn 0.8s cubic-bezier(.36,.07,.19,.97);
  }

  .yes-overlay .response-title { color: #ffccd5; text-shadow: 0 0 60px rgba(255,180,200,0.6); }
  .no-overlay  .response-title { color: #8090c0; text-shadow: 0 0 40px rgba(100,120,200,0.4); }

  @keyframes bounceIn {
    0%   { transform: scale(0.3); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }

  .response-sub {
    font-size: clamp(16px, 3vw, 24px);
    color: rgba(255,200,210,0.8);
    margin-top: 16px;
    font-style: italic;
    letter-spacing: 2px;
  }

  .no-overlay .response-sub { color: rgba(160,170,220,0.7); }

  .close-btn {
    margin-top: 40px;
    background: transparent;
    border: 1px solid rgba(255,200,210,0.3);
    color: rgba(255,200,210,0.6);
    padding: 12px 40px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.3s;
  }

  .close-btn:hover {
    border-color: rgba(255,200,210,0.7);
    color: rgba(255,200,210,0.9);
  }

  .hearts-burst {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    font-size: 24px;
    animation: burst 1.5s ease-out forwards;
  }

  @keyframes burst {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.3); opacity: 0; }
  }

  .music-note {
    position: fixed;
    bottom: 30px; right: 30px;
    z-index: 50;
    width: 50px; height: 50px;
    border-radius: 50%;
    background: rgba(180,40,60,0.3);
    border: 1px solid rgba(245,140,160,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .music-note.playing { animation: pulse 1.5s ease-in-out infinite; background: rgba(180,40,60,0.5); }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(200,60,80,0.4); }
    50%       { box-shadow: 0 0 0 12px rgba(200,60,80,0); }
  }
</style>
</head>
<body>

<div class="petals-bg" id="petals"></div>

<div class="hero">
  <div class="main-title">¿Quieres ser mi novia?</div>
  <div class="subtitle">✦ &nbsp; Una pregunta del corazón &nbsp; ✦</div>
</div>

<div class="collage">
  <div class="photo-grid" id="photoGrid"></div>
</div>

<div class="question-section">
  <div class="question-text">Mi respuesta eres tú...</div>
  <div class="buttons">
    <button class="btn btn-yes" onclick="handleYes()">♡ &nbsp; Sí</button>
    <button class="btn btn-no"  onclick="handleNo()">No</button>
  </div>
</div>

<div class="response-overlay yes-overlay" id="yesOverlay">
  <div class="response-title">¡Sí! 💕</div>
  <div class="response-sub">Eres mi felicidad mi amor...</div>
  <div class="response-sub" style="margin-top:8px;font-size:14px;opacity:0.6;">— Dame un besito —</div>
  <button class="close-btn" onclick="closeOverlay('yes')">Cerrar ✕</button>
</div>

<div class="response-overlay no-overlay" id="noOverlay">
  <div class="response-title" style="font-size:clamp(40px,8vw,90px)">Está bien...</div>
  <div class="response-sub">Seguiré aquí, esperando con paciencia.</div>
  <div class="response-sub" style="margin-top:8px;font-size:14px;opacity:0.5;">El tiempo a veces cambia las cosas.</div>
  <button class="close-btn" onclick="closeOverlay('no')">Cerrar ✕</button>
</div>

<div class="music-note" id="musicBtn" title="Música de fondo">♪</div>

<!-- ============================================================
     CANCIONES: cambia el src por la ruta de tu archivo de audio
     ============================================================ -->
<audio id="audioYes" loop>
  <source src="cancion_si.mp3" type="audio/mpeg">
</audio>
<audio id="audioNo" loop>
  <source src="cancion_no.mp3" type="audio/mpeg">
</audio>
<audio id="audioBg" loop>
  <source src="cancion_fondo.mp3" type="audio/mpeg">
</audio>

<script>
/* ============================================================
   FOTOS: cambia cada src por la ruta de tu imagen
   Ejemplos:
     src: 'fotos/1.jpg'          <- imagen en subcarpeta
     src: '1.jpg'                <- imagen en la misma carpeta
     src: 'data:image/jpeg;base64,/9j/...'  <- base64
   ============================================================ */
const slots = [
  { cls: 'p1',  src: '1.jpg' },
  { cls: 'p2',  src: '2.jpg' },
  { cls: 'p3',  src: '3.jpg' },
  { cls: 'p4',  src: '4.jpg' },
  { cls: 'p5',  src: '5.jpg' },
  { cls: 'p6',  src: '6.jpg' },
  { cls: 'p7',  src: '7.jpg' },
  { cls: 'p8',  src: '8.jpg' },
  { cls: 'p9',  src: '9.jpg' },
  { cls: 'p10', src: '10.jpg' },
  { cls: 'p11', src: '11.jpg' },
];

const grid = document.getElementById('photoGrid');
slots.forEach(slot => {
  const div = document.createElement('div');
  div.className = 'photo-slot ' + slot.cls;
  div.innerHTML = `<img src="${slot.src}" alt="foto"><div class="overlay"></div>`;
  grid.appendChild(div);
});

/* Pétalos */
const container = document.getElementById('petals');
const emojis = ['🌸','🌺','❤️','💕','🌹','✨','💫'];
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (6 + Math.random() * 10) + 's';
  p.style.animationDelay   = (Math.random() * 12) + 's';
  p.style.fontSize = (12 + Math.random() * 16) + 'px';
  container.appendChild(p);
}

/* Música de fondo */
let bgPlaying = false;
const audioBg  = document.getElementById('audioBg');
const musicBtn = document.getElementById('musicBtn');
musicBtn.addEventListener('click', () => {
  bgPlaying ? audioBg.pause() : audioBg.play().catch(() => {});
  bgPlaying = !bgPlaying;
  musicBtn.classList.toggle('playing', bgPlaying);
});

/* Corazones al presionar Sí */
function burstHearts(x, y) {
  const em = ['💕','❤️','💗','💖','🌹','✨'];
  for (let i = 0; i < 12; i++) {
    const h = document.createElement('div');
    h.className = 'hearts-burst';
    h.textContent = em[Math.floor(Math.random() * em.length)];
    h.style.left = x + 'px';
    h.style.top  = y + 'px';
    const angle = (Math.PI * 2 / 12) * i;
    const dist  = 80 + Math.random() * 80;
    h.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    h.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 1600);
  }
}

function handleYes() {
  const r = document.querySelector('.btn-yes').getBoundingClientRect();
  burstHearts(r.left + r.width / 2, r.top + r.height / 2);
  audioBg.pause(); bgPlaying = false; musicBtn.classList.remove('playing');
  document.getElementById('audioNo').pause();
  const ay = document.getElementById('audioYes');
  ay.currentTime = 0; ay.play().catch(() => {});
  setTimeout(() => document.getElementById('yesOverlay').classList.add('active'), 400);
}

function handleNo() {
  audioBg.pause(); bgPlaying = false; musicBtn.classList.remove('playing');
  document.getElementById('audioYes').pause();
  const an = document.getElementById('audioNo');
  an.currentTime = 0; an.play().catch(() => {});
  setTimeout(() => document.getElementById('noOverlay').classList.add('active'), 200);
}

function closeOverlay(which) {
  if (which === 'yes') {
    document.getElementById('yesOverlay').classList.remove('active');
    document.getElementById('audioYes').pause();
  } else {
    document.getElementById('noOverlay').classList.remove('active');
    document.getElementById('audioNo').pause();
  }
}
</script>
</body>
</html>
